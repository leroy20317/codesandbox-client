server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;

    location = /__sandpack_config__.js {
        add_header Cache-Control "no-store" always;
        try_files $uri =404;
    }

    location ~ ^/(?:.+/)?__sandpack_config__\.js$ {
        add_header Cache-Control "no-store" always;
        alias /usr/share/nginx/html/__sandpack_config__.js;
    }

    location /__sandpack_packages__/ {
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        add_header Access-Control-Allow-Headers "*" always;

        if ($request_method = OPTIONS) {
            return 204;
        }

        try_files $uri =404;
    }

    location ~ ^/(?:.+/)?__sandpack_packages__/(.*)$ {
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        add_header Access-Control-Allow-Headers "*" always;

        if ($request_method = OPTIONS) {
            return 204;
        }

        alias /usr/share/nginx/html/__sandpack_packages__/$1;
    }

    location ~ ^/(?:.+/)?(static/.*|[^/]+\.(?:css|ico|js|json|map|png|svg|txt|wasm|worker\.js))$ {
        try_files /$1 =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
