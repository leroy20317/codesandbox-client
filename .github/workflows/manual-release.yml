name: Manual Sandpack Bundler Release
run-name: Sandpack Bundler Release ${{ inputs.tag_name }}

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release tag, for example v1.0.0'
        required: true
        type: string

permissions:
  contents: write
  packages: write

concurrency:
  group: manual-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build and release offline Sandpack bundler
    runs-on: ubuntu-latest

    env:
      IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/sandpack-bundler

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate release tag
        env:
          TAG_NAME: ${{ inputs.tag_name }}
        run: |
          if [[ ! "$TAG_NAME" =~ ^[A-Za-z0-9._-]+$ ]]; then
            echo "Tag name can only contain letters, numbers, dots, underscores, and hyphens."
            exit 1
          fi

          if git ls-remote --exit-code --tags origin "refs/tags/$TAG_NAME" >/dev/null 2>&1; then
            echo "Tag $TAG_NAME already exists."
            exit 1
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build dependencies
        run: yarn build:deps

      - name: Build Sandpack bundler
        run: yarn build:sandpack

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Restore offline packages from previous image
        run: |
          if docker pull "$IMAGE_NAME:latest"; then
            container_id="$(docker create "$IMAGE_NAME:latest")"
            trap 'docker rm -f "$container_id" >/dev/null 2>&1 || true' EXIT

            rm -rf offline-packages
            docker cp "$container_id:/usr/share/nginx/html/__sandpack_packages__" offline-packages
          else
            echo "No previous latest image found; downloading offline packages from scratch."
          fi

      - name: Download offline npm package mirror
        run: yarn sandpack:offline:download

      - name: Verify offline npm package mirror
        run: yarn sandpack:offline:verify

      - name: Validate Docker build inputs
        run: |
          test -d www
          test -f www/index.html
          test -f offline-packages/manifest.json

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/sandpack-offline/Dockerfile
          load: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ inputs.tag_name }}
            ${{ env.IMAGE_NAME }}:latest

      - name: Smoke test Docker image
        env:
          TAG_NAME: ${{ inputs.tag_name }}
        run: |
          docker run -d \
            --name sandpack-bundler-test \
            -p 18080:80 \
            "$IMAGE_NAME:$TAG_NAME"

          sleep 3

          curl -f http://127.0.0.1:18080/__sandpack_config__.js
          curl -f http://127.0.0.1:18080/__sandpack_packages__/manifest.json
          curl -s http://127.0.0.1:18080/__sandpack_config__.js | grep "local-first"

          docker logs sandpack-bundler-test
          docker rm -f sandpack-bundler-test

      - name: Push Docker image
        env:
          TAG_NAME: ${{ inputs.tag_name }}
        run: |
          docker push "$IMAGE_NAME:$TAG_NAME"
          docker push "$IMAGE_NAME:latest"

      - name: Prepare release notes
        env:
          TAG_NAME: ${{ inputs.tag_name }}
        run: |
          cat > release-notes.md <<EOF
          # Sandpack Bundler $TAG_NAME

          GitHub Container Registry image:

          \`\`\`text
          $IMAGE_NAME:$TAG_NAME
          \`\`\`

          ## manifest.json

          \`\`\`json
          EOF

          cat offline-packages/manifest.json >> release-notes.md

          cat >> release-notes.md <<EOF
          \`\`\`

          ## docker-compose.yml

          \`\`\`yaml
          services:
            sandpack-bundler:
              # The image is published to GitHub Container Registry.
              # Runtime defaults to SANDPACK_PACKAGE_RESOLVE_MODE=local-first.
              image: $IMAGE_NAME:$TAG_NAME
              container_name: sandpack-bundler
              restart: unless-stopped
              ports:
                - "9801:80"
          \`\`\`

          ## .env.example

          \`\`\`env
          # Optional. Defaults to local-first.
          # Available values: offline-only, local-first
          SANDPACK_PACKAGE_RESOLVE_MODE=local-first
          \`\`\`

          ## Export image for private deployment

          \`\`\`bash
          docker pull $IMAGE_NAME:$TAG_NAME
          docker tag $IMAGE_NAME:$TAG_NAME sandpack-bundler:$TAG_NAME
          docker save sandpack-bundler:$TAG_NAME | gzip > sandpack-bundler-$TAG_NAME.tar.gz
          \`\`\`

          ## Load image on private server

          \`\`\`bash
          gunzip -c sandpack-bundler-$TAG_NAME.tar.gz | docker load
          docker compose up -d
          \`\`\`

          Consumer applications should point to the bundler service:

          \`\`\`env
          SANDPACK_BUNDLER_URL=http://<internal-host>:8080/
          \`\`\`

          For sub-path reverse proxy deployments, keep the trailing slash:

          \`\`\`env
          SANDPACK_BUNDLER_URL=https://example.com/sandpack-bundler/
          \`\`\`
          EOF

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ inputs.tag_name }}
        run: |
          gh release create "$TAG_NAME" \
            --target "$GITHUB_SHA" \
            --title "$TAG_NAME" \
            --notes-file release-notes.md
